apiVersion: v1
kind: ResourceQuota
metadata:
  name: app1-resourcequota
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  namespace: app1-ns
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "10"
    services: "5"
    persistentvolumeclaims: "5"
    requests.storage: 20Gi
